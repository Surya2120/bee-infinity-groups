<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bee Infinity Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/merch.css">
</head>
<body>

<header>
  <div class="logo">Bee Infinity Store</div>
  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<section class="hero">
  <h1>Creative Empire Collection</h1>
  <p>Premium Merchandise & Handmade Mandala Arts</p>
</section>

<section class="products" id="product-list">
  <!-- PRODUCTS GENERATED BY JS -->
</section>

<!-- CART SIDEBAR -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <h3>Total: ₹<span id="cart-total">0</span></h3>

  <button class="checkout-btn" onclick="openCheckout()">Checkout</button>
</div>

<!-- CHECKOUT MODAL -->
<div class="checkout" id="checkout">
  <div class="checkout-box">
    <h2>Checkout</h2>
    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Phone Number">
    <input type="text" placeholder="Address">
    <button onclick="placeOrder()">Place Order</button>
    <button class="close-btn" onclick="closeCheckout()">Cancel</button>
  </div>
</div>

<script src="js/merch.js"></script>
</body>
</html>
