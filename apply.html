<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply | Bee Infinity Groups</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/hiring.css">
  <link rel="stylesheet" href="css/apply.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<section class="apply-page">

  <h1>Apply Now</h1>
  <p class="subtitle">Fill the form to join Bee Infinity Groups</p>

  <form id="applicationForm">

    <label>Applying For</label>
    <input type="text" name="jobRole" id="jobRole" readonly>

    <label>Full Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Phone</label>
    <input type="tel" name="phone" required>

    <label>Experience</label>
    <select name="experience" required>
      <option value="">Select</option>
      <option>Fresher</option>
      <option>1-3 Years</option>
      <option>3+ Years</option>
    </select>

    <label>Skills</label>
    <input type="text" name="skills">

    <label>Portfolio</label>
    <input type="text" name="portfolio">

    <!-- FILE UPLOAD -->
    <label>Upload Resume (PDF)</label>
    <input type="file" id="resumeFile" accept=".pdf" required>

    <label>Why should we hire you?</label>
    <textarea name="message"></textarea>

    <button type="submit">Submit Application</button>

  </form>

</section>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="js/apply.js"></script>

</body>
</html>
